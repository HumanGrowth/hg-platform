<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border)">
      
        <div style="aspect-ratio:1;background:#B8A799;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--warm-900)">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1.3">warm-300<br>#B8A799</div>
        </div>
        <div style="aspect-ratio:1;background:#8A7765;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--warm-900)">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1.3">warm-400<br>#8A7765</div>
        </div>
        <div style="aspect-ratio:1;background:#6B5949;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--cream-100)">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1.3">warm-500<br>#6B5949</div>
        </div>
        <div style="aspect-ratio:1;background:#5C4A3F;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--cream-100)">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1.3">warm-600<br>#5C4A3F</div>
        </div>
        <div style="aspect-ratio:1;background:#3D3027;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--cream-100)">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1.3">warm-700<br>#3D3027</div>
        </div>
        <div style="aspect-ratio:1;background:#2A2018;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--cream-100)">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1.3">warm-800<br>#2A2018</div>
        </div>
        <div style="aspect-ratio:1;background:#1A140F;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--cream-100)">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1.3">warm-900<br>#1A140F</div>
        </div>
    </div>
    <div class="eyebrow" style="margin-top:12px">NEUTRALS · WARM &nbsp;·&nbsp; <code>warm-900</code> is INK (never pure black)</div>
  </div></body></html>
