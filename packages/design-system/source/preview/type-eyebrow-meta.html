<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><span class="eyebrow eyebrow-accent">NEW PATH</span></div>
      <div><span class="eyebrow">12 MIN · BEGINNER · 3 LESSONS</span></div>
      <div><span class="eyebrow">EARNED · 14 MAR 2026</span></div>
      <div style="display:flex;gap:8px">
        <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;background:var(--orange-500);color:#fff;padding:4px 8px;border-radius:4px">LIVE</span>
        <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;background:var(--cream-200);color:var(--warm-700);padding:4px 8px;border-radius:4px">DRAFT</span>
        <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;background:var(--success-bg);color:var(--success);padding:4px 8px;border-radius:4px">EARNED</span>
      </div>
    </div>
    <div class="body-xs" style="margin-top:14px">12px · semi-bold · uppercase · tracking <code>+0.08em</code> · middot <code>·</code> separator</div>
  </div></body></html>
