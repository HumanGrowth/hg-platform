<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:flex;flex-direction:column;gap:18px">
      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="eyebrow">PATH PROGRESS</span><span class="body-xs" style="font-weight:600">3 / 7 lessons</span></div>
        <div style="height:6px;background:var(--cream-200);border-radius:3px;overflow:hidden"><div style="width:42%;height:100%;background:var(--orange-500)"></div></div>
      </div>
      <div style="display:flex;gap:6px">
        <div style="flex:1;height:4px;border-radius:2px;background:var(--orange-500)"></div><div style="flex:1;height:4px;border-radius:2px;background:var(--orange-500)"></div><div style="flex:1;height:4px;border-radius:2px;background:var(--orange-500)"></div><div style="flex:1;height:4px;border-radius:2px;background:var(--orange-200)"></div><div style="flex:1;height:4px;border-radius:2px;background:var(--cream-200)"></div><div style="flex:1;height:4px;border-radius:2px;background:var(--cream-200)"></div><div style="flex:1;height:4px;border-radius:2px;background:var(--cream-200)"></div>
      </div>
      <div style="display:flex;align-items:center;gap:18px">
        <div style="position:relative;width:64px;height:64px">
          <svg viewBox="0 0 36 36" style="transform:rotate(-90deg);width:64px;height:64px">
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#F8EDD4" stroke-width="3"/>
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#FF4500" stroke-width="3" stroke-dasharray="42 100" stroke-linecap="round"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:18px">42%</div>
        </div>
        <div>
          <div style="font-weight:600;font-size:14px">This quarter</div>
          <div class="body-xs">3 of 7 paths complete</div>
        </div>
      </div>
    </div>
  </div></body></html>
