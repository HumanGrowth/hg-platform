<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div style="background:var(--cream-50);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:8px">
        <div class="eyebrow eyebrow-accent">NEW PATH</div>
        <div style="font-family:var(--font-display);font-size:24px;line-height:0.98;text-transform:uppercase;letter-spacing:-0.01em">Writing PR descriptions reviewers actually read</div>
        <div class="body-sm" style="margin-top:4px">7 lessons · 1 hr 20 min · Beginner</div>
        <div style="display:flex;gap:0;margin-top:8px;align-items:center">
          <div style="width:24px;height:24px;border-radius:9999px;background:var(--cream-300);border:2px solid var(--cream-50)"></div>
          <div style="width:24px;height:24px;border-radius:9999px;background:var(--warm-400);border:2px solid var(--cream-50);margin-left:-10px"></div>
          <div style="width:24px;height:24px;border-radius:9999px;background:var(--orange-300);border:2px solid var(--cream-50);margin-left:-10px"></div>
          <span class="body-xs" style="margin-left:8px">312 in cohort</span>
        </div>
      </div>
      <div style="background:var(--warm-900);color:var(--cream-100);border-radius:12px;padding:18px;display:flex;flex-direction:column;justify-content:space-between;gap:16px">
        <div>
          <div class="eyebrow" style="color:var(--orange-300)">CONTINUE</div>
          <div style="font-family:var(--font-display);font-size:24px;line-height:0.98;text-transform:uppercase;letter-spacing:-0.01em;margin-top:6px">Reframing a stuck project</div>
        </div>
        <div>
          <div style="height:4px;background:rgba(245,235,214,0.15);border-radius:2px;overflow:hidden"><div style="width:42%;height:100%;background:var(--orange-500)"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:8px"><span class="body-xs" style="color:#B8A799">Lesson 3 of 7</span><span class="body-xs" style="color:var(--orange-300);font-weight:600">42%</span></div>
        </div>
      </div>
    </div>
    <div class="eyebrow" style="margin-top:14px">LIGHT CARD &nbsp;/&nbsp; INK CARD (CONTINUE STATE)</div>
  </div></body></html>
