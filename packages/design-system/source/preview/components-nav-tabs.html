<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="border-bottom:1px solid var(--border);display:flex;gap:4px;padding-bottom:0">
      
        <div style="padding:14px 16px;font-size:14px;font-weight:600;color:var(--orange-700);border-bottom:2px solid var(--orange-500);margin-bottom:-1px;cursor:pointer">Paths</div>
        <div style="padding:14px 16px;font-size:14px;font-weight:600;color:var(--fg-muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer">Library</div>
        <div style="padding:14px 16px;font-size:14px;font-weight:600;color:var(--fg-muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer">Mentorships</div>
        <div style="padding:14px 16px;font-size:14px;font-weight:600;color:var(--fg-muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer">Events</div>
        <div style="padding:14px 16px;font-size:14px;font-weight:600;color:var(--fg-muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer">Badges</div>
    </div>
    <div style="height:18px"></div>
    <div style="display:inline-flex;background:var(--cream-200);border-radius:8px;padding:3px;gap:2px">
      
        <div style="padding:6px 14px;font-size:13px;font-weight:600;border-radius:6px;background:var(--cream-50);color:var(--warm-900);box-shadow:var(--shadow-sm);cursor:pointer">Active</div>
        <div style="padding:6px 14px;font-size:13px;font-weight:600;border-radius:6px;background:transparent;color:var(--fg-muted);box-shadow:none;cursor:pointer">Earned</div>
        <div style="padding:6px 14px;font-size:13px;font-weight:600;border-radius:6px;background:transparent;color:var(--fg-muted);box-shadow:none;cursor:pointer">Saved</div>
    </div>
    <div class="eyebrow" style="margin-top:14px">UNDERLINE TABS (PAGE-LEVEL) &nbsp;/&nbsp; SEGMENTED (FILTERED VIEW)</div>
  </div></body></html>
