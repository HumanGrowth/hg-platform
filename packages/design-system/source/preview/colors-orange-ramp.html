<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border)">
      
        <div style="aspect-ratio:1;background:var(--orange-50);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:var(--warm-900);">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1">50</div>
        </div>
        <div style="aspect-ratio:1;background:var(--orange-100);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:var(--warm-900);">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1">100</div>
        </div>
        <div style="aspect-ratio:1;background:var(--orange-200);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:var(--warm-900);">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1">200</div>
        </div>
        <div style="aspect-ratio:1;background:var(--orange-300);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:var(--warm-900);">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1">300</div>
        </div>
        <div style="aspect-ratio:1;background:var(--orange-400);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1">400</div>
        </div>
        <div style="aspect-ratio:1;background:var(--orange-500);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1">500</div>
        </div>
        <div style="aspect-ratio:1;background:var(--orange-600);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1">600</div>
        </div>
        <div style="aspect-ratio:1;background:var(--orange-700);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1">700</div>
        </div>
        <div style="aspect-ratio:1;background:var(--orange-800);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1">800</div>
        </div>
        <div style="aspect-ratio:1;background:var(--orange-900);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;">
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500;line-height:1">900</div>
        </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:12px">
      <div class="eyebrow eyebrow-accent">PRIMARY · ORANGE</div>
      <div class="body-xs"><code>--orange-500</code> = <code>#FF4500</code> &nbsp; the brand</div>
    </div>
  </div></body></html>
