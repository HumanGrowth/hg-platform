<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="background:var(--cream-100);border:1px solid var(--border);border-radius:12px;padding:20px;height:200px;display:flex;flex-direction:column;justify-content:space-between">
        <div class="eyebrow">LIGHT &nbsp;·&nbsp; DEFAULT</div>
        <div>
          <div style="font-family:var(--font-display);font-size:36px;line-height:0.95;color:var(--warm-900);text-transform:uppercase;letter-spacing:-0.01em">Get promoted<br>on purpose</div>
          <div class="body-sm" style="margin-top:8px">Pick a path. Start today.</div>
        </div>
        <div><button style="background:var(--orange-500);color:#fff;border:0;padding:10px 18px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:14px;cursor:pointer">Start a path →</button></div>
      </div>
      <div data-theme="dark" style="background:#13100D;border:1px solid rgba(245,235,214,0.10);border-radius:12px;padding:20px;height:200px;display:flex;flex-direction:column;justify-content:space-between">
        <div class="eyebrow" style="color:#B8A799">DARK</div>
        <div>
          <div style="font-family:var(--font-display);font-size:36px;line-height:0.95;color:#F5EBD6;text-transform:uppercase;letter-spacing:-0.01em">Get promoted<br>on purpose</div>
          <div style="font-size:14px;color:#B8A799;margin-top:8px">Pick a path. Start today.</div>
        </div>
        <div><button style="background:var(--orange-500);color:var(--warm-900);border:0;padding:10px 18px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:14px;cursor:pointer">Start a path →</button></div>
      </div>
    </div>
  </div></body></html>
