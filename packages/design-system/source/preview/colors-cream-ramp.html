<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border)">
      
        <div style="aspect-ratio:1;background:#FFFCF6;padding:10px;display:flex;flex-direction:column;justify-content:space-between;color:var(--warm-900)">
          <div class="body-xs" style="font-weight:600">lifted surface</div>
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500">cream-50<br>#FFFCF6</div>
        </div>
        <div style="aspect-ratio:1;background:#FDF5E6;padding:10px;display:flex;flex-direction:column;justify-content:space-between;color:var(--warm-900)">
          <div class="body-xs" style="font-weight:600">default canvas</div>
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500">cream-100<br>#FDF5E6</div>
        </div>
        <div style="aspect-ratio:1;background:#F8EDD4;padding:10px;display:flex;flex-direction:column;justify-content:space-between;color:var(--warm-900)">
          <div class="body-xs" style="font-weight:600">sunken</div>
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500">cream-200<br>#F8EDD4</div>
        </div>
        <div style="aspect-ratio:1;background:#F0E0BD;padding:10px;display:flex;flex-direction:column;justify-content:space-between;color:var(--warm-900)">
          <div class="body-xs" style="font-weight:600"></div>
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500">cream-300<br>#F0E0BD</div>
        </div>
        <div style="aspect-ratio:1;background:#E2CDA0;padding:10px;display:flex;flex-direction:column;justify-content:space-between;color:var(--warm-900)">
          <div class="body-xs" style="font-weight:600"></div>
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:500">cream-400<br>#E2CDA0</div>
        </div>
    </div>
    <div class="eyebrow" style="margin-top:12px">BASE · CREAM &nbsp;·&nbsp; never use pure #ffffff</div>
  </div></body></html>
