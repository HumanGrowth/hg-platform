<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:flex;flex-direction:column;gap:14px">
      <div style="display:flex;gap:10px;align-items:center">
        <button style="background:var(--orange-500);color:#fff;border:0;padding:12px 20px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:14px;cursor:pointer">Start a path</button>
        <button style="background:var(--orange-600);color:#fff;border:0;padding:12px 20px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:14px">Start a path</button>
        <button style="background:var(--orange-700);color:#fff;border:0;padding:12px 20px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:14px;transform:scale(0.98)">Start a path</button>
        <button style="background:var(--orange-500);color:#fff;border:0;padding:12px 20px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:14px;opacity:0.4">Disabled</button>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button style="background:transparent;color:var(--warm-900);border:1px solid var(--border-strong);padding:11px 20px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:14px;cursor:pointer">Save for later</button>
        <button style="background:transparent;color:var(--warm-900);border:0;padding:12px 16px;font-family:var(--font-body);font-weight:600;font-size:14px;cursor:pointer">Cancel</button>
        <button style="background:transparent;color:var(--orange-700);border:0;padding:12px 16px;font-family:var(--font-body);font-weight:600;font-size:14px;cursor:pointer;border-bottom:1px solid var(--orange-700);border-radius:0">View details →</button>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button style="background:var(--warm-900);color:var(--cream-100);border:0;padding:14px 24px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:16px;cursor:pointer">Continue →</button>
        <button style="background:var(--cream-200);color:var(--warm-900);border:0;padding:10px 14px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:13px;cursor:pointer">Small</button>
      </div>
    </div>
    <div class="eyebrow" style="margin-top:14px">PRIMARY · HOVER · PRESS · DISABLED &nbsp;/&nbsp; SECONDARY · GHOST · LINK &nbsp;/&nbsp; INK · SMALL</div>
  </div></body></html>
