<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:flex;align-items:flex-end;gap:12px">
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:4px;height:4px;background:var(--orange-500);border-radius:2px"></div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">4</div>
          <div class="eyebrow" style="font-size:9px">1</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:8px;height:8px;background:var(--orange-500);border-radius:2px"></div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">8</div>
          <div class="eyebrow" style="font-size:9px">2</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:12px;height:12px;background:var(--orange-500);border-radius:2px"></div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">12</div>
          <div class="eyebrow" style="font-size:9px">3</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:16px;height:16px;background:var(--orange-500);border-radius:2px"></div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">16</div>
          <div class="eyebrow" style="font-size:9px">4</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:20px;height:20px;background:var(--orange-500);border-radius:2px"></div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">20</div>
          <div class="eyebrow" style="font-size:9px">5</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:24px;height:24px;background:var(--orange-500);border-radius:2px"></div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">24</div>
          <div class="eyebrow" style="font-size:9px">6</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:32px;height:32px;background:var(--orange-500);border-radius:2px"></div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">32</div>
          <div class="eyebrow" style="font-size:9px">8</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:40px;height:40px;background:var(--orange-500);border-radius:2px"></div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">40</div>
          <div class="eyebrow" style="font-size:9px">10</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:48px;height:48px;background:var(--orange-500);border-radius:2px"></div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">48</div>
          <div class="eyebrow" style="font-size:9px">12</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:64px;height:64px;background:var(--orange-500);border-radius:2px"></div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">64</div>
          <div class="eyebrow" style="font-size:9px">16</div>
        </div>
    </div>
    <div class="body-xs" style="margin-top:14px">4px base · <code>--space-1</code> through <code>--space-32</code> · 8/12/16/24 are the workhorses</div>
  </div></body></html>
