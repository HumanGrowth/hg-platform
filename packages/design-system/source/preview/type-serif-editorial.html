<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="background:var(--cream-100);border:1px solid var(--border);border-radius:12px;padding:24px">
      <div class="eyebrow eyebrow-accent">PULL QUOTE</div>
      <div class="serif" style="font-size:32px;line-height:1.15;margin-top:8px;color:var(--warm-900)">
        Most growth happens <span class="serif-italic">between</span> the lessons — in the brief you write right after.
      </div>
      <div class="body-sm" style="margin-top:14px">— Priya N., Staff PM at Linear</div>
    </div>
    <div class="body-xs" style="margin-top:10px"><code>Instrument Serif</code> · pull quotes, mentor names, course taglines · italic <em>where it lands</em></div>
  </div></body></html>
