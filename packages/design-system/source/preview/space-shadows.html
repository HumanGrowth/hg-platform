<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:16px">
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
          <div style="width:100%;height:80px;background:var(--cream-50);border-radius:12px;box-shadow:0 1px 2px rgba(26,20,15,0.06)"></div>
          <div class="eyebrow">SM</div>
          <div class="body-xs" style="text-align:center;font-family:var(--font-mono);font-size:9px;color:var(--fg-muted)">--shadow-sm</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
          <div style="width:100%;height:80px;background:var(--cream-50);border-radius:12px;box-shadow:0 6px 16px -4px rgba(26,20,15,0.08), 0 2px 4px rgba(26,20,15,0.04)"></div>
          <div class="eyebrow">MD</div>
          <div class="body-xs" style="text-align:center;font-family:var(--font-mono);font-size:9px;color:var(--fg-muted)">--shadow-md</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
          <div style="width:100%;height:80px;background:var(--cream-50);border-radius:12px;box-shadow:0 24px 48px -12px rgba(26,20,15,0.18)"></div>
          <div class="eyebrow">LG</div>
          <div class="body-xs" style="text-align:center;font-family:var(--font-mono);font-size:9px;color:var(--fg-muted)">--shadow-lg</div>
        </div>
    </div>
    <div class="body-xs" style="margin-top:6px">Warm-ink tint · restrained · cards either border OR shadow, never both</div>
  </div></body></html>
