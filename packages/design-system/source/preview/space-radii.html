<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:flex;gap:16px;align-items:flex-end">
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:64px;height:64px;background:var(--cream-200);border:1px solid var(--border);border-radius:0px"></div>
          <div class="eyebrow" style="font-size:9px">none</div>
          <div class="body-xs" style="font-size:10px;text-align:center;width:64px;color:var(--fg-muted)">—</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:64px;height:64px;background:var(--cream-200);border:1px solid var(--border);border-radius:4px"></div>
          <div class="eyebrow" style="font-size:9px">sm</div>
          <div class="body-xs" style="font-size:10px;text-align:center;width:64px;color:var(--fg-muted)">1px detail</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:64px;height:64px;background:var(--cream-200);border:1px solid var(--border);border-radius:8px"></div>
          <div class="eyebrow" style="font-size:9px">md</div>
          <div class="body-xs" style="font-size:10px;text-align:center;width:64px;color:var(--fg-muted)">buttons / inputs</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:64px;height:64px;background:var(--cream-200);border:1px solid var(--border);border-radius:12px"></div>
          <div class="eyebrow" style="font-size:9px">lg</div>
          <div class="body-xs" style="font-size:10px;text-align:center;width:64px;color:var(--fg-muted)">cards</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:64px;height:64px;background:var(--cream-200);border:1px solid var(--border);border-radius:16px"></div>
          <div class="eyebrow" style="font-size:9px">xl</div>
          <div class="body-xs" style="font-size:10px;text-align:center;width:64px;color:var(--fg-muted)">sheets</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:64px;height:64px;background:var(--cream-200);border:1px solid var(--border);border-radius:24px"></div>
          <div class="eyebrow" style="font-size:9px">2xl</div>
          <div class="body-xs" style="font-size:10px;text-align:center;width:64px;color:var(--fg-muted)"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:64px;height:64px;background:var(--cream-200);border:1px solid var(--border);border-radius:9999px"></div>
          <div class="eyebrow" style="font-size:9px">full</div>
          <div class="body-xs" style="font-size:10px;text-align:center;width:64px;color:var(--fg-muted)">avatars only</div>
        </div>
    </div>
    <div class="body-xs" style="margin-top:14px">Sharp by default. We do not pillow everything — the brand is geometric.</div>
  </div></body></html>
