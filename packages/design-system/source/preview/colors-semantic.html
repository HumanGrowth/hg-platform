<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
      
        <div style="border:1px solid var(--border);border-radius:12px;overflow:hidden">
          <div style="background:#DFF0E5;color:#1F7A4D;padding:14px 12px;display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px">
            <div style="width:10px;height:10px;border-radius:9999px;background:#1F7A4D"></div>Success
          </div>
          <div style="padding:8px 12px;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">--success<br>#1F7A4D</div>
        </div>
        <div style="border:1px solid var(--border);border-radius:12px;overflow:hidden">
          <div style="background:#FBE9CC;color:#B8741A;padding:14px 12px;display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px">
            <div style="width:10px;height:10px;border-radius:9999px;background:#B8741A"></div>Warning
          </div>
          <div style="padding:8px 12px;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">--warning<br>#B8741A</div>
        </div>
        <div style="border:1px solid var(--border);border-radius:12px;overflow:hidden">
          <div style="background:#FADAD2;color:#B83A1A;padding:14px 12px;display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px">
            <div style="width:10px;height:10px;border-radius:9999px;background:#B83A1A"></div>Danger
          </div>
          <div style="padding:8px 12px;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">--danger<br>#B83A1A</div>
        </div>
        <div style="border:1px solid var(--border);border-radius:12px;overflow:hidden">
          <div style="background:#DCE9EF;color:#2A5F7A;padding:14px 12px;display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px">
            <div style="width:10px;height:10px;border-radius:9999px;background:#2A5F7A"></div>Info
          </div>
          <div style="padding:8px 12px;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)">--info<br>#2A5F7A</div>
        </div>
    </div>
    <div class="eyebrow" style="margin-top:12px">SEMANTIC &nbsp;·&nbsp; warm-leaning, never neon</div>
  </div></body></html>
