<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="background:var(--cream-100);border:1px solid var(--border);border-radius:12px;padding:32px 28px;position:relative;overflow:hidden;height:340px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="position:absolute;top:-60px;right:-60px;opacity:0.06">
        <img src="../assets/logo-color.svg" style="height:380px">
      </div>
      <div class="eyebrow eyebrow-accent">SEASON 02 · ENROLLMENT OPEN</div>
      <div>
        <div style="font-family:var(--font-display);font-size:72px;line-height:0.9;color:var(--warm-900);text-transform:uppercase;letter-spacing:-0.02em">Grow on<br>purpose.</div>
        <div class="body-lg" style="margin-top:18px;max-width:360px">12 paths. 60+ mentors. Built for people who hate the word journey.</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button style="background:var(--orange-500);color:#fff;border:0;padding:12px 22px;border-radius:8px;font-weight:600;font-size:14px">Get started →</button>
        <button style="background:transparent;color:var(--warm-900);border:1px solid var(--border-strong);padding:11px 22px;border-radius:8px;font-weight:600;font-size:14px">For teams</button>
      </div>
    </div>
    <div class="eyebrow" style="margin-top:12px">SOCIAL / POSTER LOCKUP &nbsp;·&nbsp; 6% logo bleed, cream canvas, ink display, orange CTA</div>
  </div></body></html>
