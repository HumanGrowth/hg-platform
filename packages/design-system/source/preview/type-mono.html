<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:flex;flex-direction:column;gap:10px;font-family:var(--font-mono)">

      <code style="font-size:14px">PATH_ID=hg_pm_writing_v2</code>
      <div style="display:flex;gap:8px">
        <kbd style="padding:4px 8px;background:var(--bg-sunken);border:1px solid var(--border);border-radius:4px;font-size:12px">⌘</kbd>
        <kbd style="padding:4px 8px;background:var(--bg-sunken);border:1px solid var(--border);border-radius:4px;font-size:12px">K</kbd>
        <span class="body-sm" style="align-self:center;color:var(--fg-muted)">— quick switch path</span>
      </div>
    </div>
    <div class="body-xs" style="margin-top:14px"><code>JetBrains Mono</code> · code, shortcut keys, IDs — and that is it</div>
  </div></body></html>
