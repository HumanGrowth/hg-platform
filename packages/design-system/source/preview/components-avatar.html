<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:flex;gap:18px;align-items:center">
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:64px;height:64px;border-radius:9999px;background:var(--orange-200);color:var(--warm-900);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:24.615384615384613px">PN</div>
          <div class="body-xs" style="font-family:var(--font-mono);font-size:10px">64</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:48px;height:48px;border-radius:9999px;background:var(--cream-300);color:var(--warm-900);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:18.46153846153846px">JR</div>
          <div class="body-xs" style="font-family:var(--font-mono);font-size:10px">48</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:40px;height:40px;border-radius:9999px;background:var(--warm-700);color:var(--cream-100);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:15.384615384615383px">AS</div>
          <div class="body-xs" style="font-family:var(--font-mono);font-size:10px">40</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:32px;height:32px;border-radius:9999px;background:var(--cream-200);color:var(--warm-800);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:12.307692307692307px">MT</div>
          <div class="body-xs" style="font-family:var(--font-mono);font-size:10px">32</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:24px;height:24px;border-radius:9999px;background:var(--warm-900);color:var(--orange-300);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:9.23076923076923px">LK</div>
          <div class="body-xs" style="font-family:var(--font-mono);font-size:10px">24</div>
        </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="display:flex;align-items:center">
          <div style="width:32px;height:32px;border-radius:9999px;background:var(--orange-300);border:2px solid var(--cream-100);color:var(--warm-900);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px">PN</div>
          <div style="width:32px;height:32px;border-radius:9999px;background:var(--warm-700);border:2px solid var(--cream-100);color:var(--cream-100);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px;margin-left:-12px">JR</div>
          <div style="width:32px;height:32px;border-radius:9999px;background:var(--cream-300);border:2px solid var(--cream-100);color:var(--warm-800);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px;margin-left:-12px">+8</div>
        </div>
        <div class="body-xs" style="font-family:var(--font-mono);font-size:10px">STACK</div>
      </div>
    </div>
    <div class="eyebrow" style="margin-top:14px">CIRCLE CROPS · WARM FALLBACK · NEVER COLORED-BY-NAME</div>
  </div></body></html>
