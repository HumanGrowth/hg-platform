<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <span style="background:var(--orange-500);color:#fff;padding:6px 12px;border-radius:9999px;font-size:13px;font-weight:600">Product</span>
      <span style="background:var(--cream-200);color:var(--warm-800);padding:6px 12px;border-radius:9999px;font-size:13px;font-weight:500">Writing</span>
      <span style="background:var(--cream-200);color:var(--warm-800);padding:6px 12px;border-radius:9999px;font-size:13px;font-weight:500">Leadership</span>
      <span style="background:transparent;color:var(--warm-700);padding:6px 12px;border:1px solid var(--border-strong);border-radius:9999px;font-size:13px;font-weight:500">+ Add filter</span>
    </div>
    <div style="height:14px"></div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <span style="background:var(--success-bg);color:var(--success);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em">Earned</span>
      <span style="background:var(--warning-bg);color:var(--warning);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em">In progress</span>
      <span style="background:var(--cream-200);color:var(--warm-700);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em">Locked</span>
      <span style="background:var(--danger-bg);color:var(--danger);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em">Expired</span>
      <span style="background:var(--info-bg);color:var(--info);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em">Beta</span>
    </div>
    <div class="eyebrow" style="margin-top:14px">FILTER CHIPS (PILL) &nbsp;/&nbsp; STATUS TAGS (SQUARE, ALL-CAPS)</div>
  </div></body></html>
