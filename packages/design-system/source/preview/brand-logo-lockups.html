<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div style="background:var(--cream-100);border:1px solid var(--border);border-radius:12px;padding:24px;display:flex;align-items:center;justify-content:center;height:140px"><img src="../assets/logo-color.svg" style="max-height:108px;max-width:100%"></div>
      <div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:24px;display:flex;align-items:center;justify-content:center;height:140px"><img src="../assets/logo-black.svg" style="max-height:108px;max-width:100%"></div>
      <div style="background:var(--warm-900);border-radius:12px;padding:24px;display:flex;align-items:center;justify-content:center;height:140px"><img src="../assets/logo-white.svg" style="max-height:108px;max-width:100%"></div>
      <div style="background:var(--warm-900);border-radius:12px;padding:24px;display:flex;align-items:center;justify-content:center;height:140px"><img src="../assets/logo-color.svg" style="max-height:108px;max-width:100%"></div>
    </div>
    <div class="eyebrow" style="margin-top:14px">PRIMARY · MONO INK · MONO LIGHT · COLOR ON DARK</div>
  </div></body></html>
