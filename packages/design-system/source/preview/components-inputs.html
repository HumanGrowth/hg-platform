<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);}
  .card{padding:24px;width:100%;box-sizing:border-box;}
</style></head><body><div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div>
        <label class="eyebrow" style="display:block;margin-bottom:6px">FULL NAME</label>
        <input value="Priya Narayanan" style="width:100%;background:var(--cream-50);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:var(--font-body);font-size:14px;color:var(--fg);box-sizing:border-box">
      </div>
      <div>
        <label class="eyebrow" style="display:block;margin-bottom:6px">WORK EMAIL</label>
        <input value="priya@linear.app" style="width:100%;background:var(--cream-50);border:2px solid var(--orange-500);border-radius:8px;padding:11px 13px;font-family:var(--font-body);font-size:14px;color:var(--fg);box-sizing:border-box">
      </div>
      <div>
        <label class="eyebrow" style="display:block;margin-bottom:6px">ROLE</label>
        <select style="width:100%;background:var(--cream-50);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:var(--font-body);font-size:14px;color:var(--fg);box-sizing:border-box;appearance:none">
          <option>Product Manager</option>
        </select>
      </div>
      <div>
        <label class="eyebrow" style="display:block;margin-bottom:6px">PASSWORD</label>
        <input placeholder="•••••••• min 12 chars" style="width:100%;background:var(--cream-50);border:1px solid var(--danger);border-radius:8px;padding:12px 14px;font-family:var(--font-body);font-size:14px;color:var(--fg);box-sizing:border-box">
        <div style="font-size:12px;color:var(--danger);margin-top:6px;font-weight:500">Needs one number.</div>
      </div>
    </div>
  </div></body></html>
