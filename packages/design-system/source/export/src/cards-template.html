<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Human Growth — Path cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <rect width="200" height="200" fill="#FDF5E6"/>
      <rect x="30" y="50" width="60" height="100" rx="6" fill="#FFFCF6" stroke="#1A140F" stroke-width="1.5"/>
      <rect x="110" y="50" width="60" height="100" rx="6" fill="#1A140F"/>
      <rect x="118" y="125" width="44" height="3" fill="#FF4500"/>
    </svg>
  </template>
  <style>
    :root {
      --orange-300: #FF8A52; --orange-500: #FF4500; --orange-700: #B33000;
      --cream-50: #FFFCF6; --cream-100: #FDF5E6; --cream-200: #F8EDD4; --cream-300: #F0E0BD;
      --warm-400: #8A7765; --warm-700: #3D3027; --warm-900: #1A140F;
      --border: rgba(26,20,15,0.12);
    }
    html, body { margin: 0; padding: 0; background: #888; font-family: 'Manrope', system-ui, sans-serif; color: var(--warm-900); }
    .page {
      width: 1080px;
      height: 1080px;
      background: var(--cream-100);
      display: flex; align-items: center; justify-content: center;
      page-break-after: always; break-after: page;
      box-sizing: border-box;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }
    .page:last-child { page-break-after: auto; }
    .corner-mark {
      position: absolute; top: 48px; left: 48px;
      font-size: 18px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--warm-400);
    }
    .corner-mark .accent { color: var(--orange-500); }

    /* CARD — light path card */
    .light-card {
      background: var(--cream-50);
      border: 1.5px solid var(--border);
      border-radius: 28px;
      padding: 64px 56px;
      width: 100%; max-width: 800px;
      display: flex; flex-direction: column; gap: 28px;
      box-sizing: border-box;
    }
    .light-card .eyebrow {
      font-size: 22px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--orange-500);
    }
    .light-card .title {
      font-family: 'Anton', sans-serif;
      font-size: 76px; line-height: 0.98;
      text-transform: uppercase; letter-spacing: -0.01em;
      color: var(--warm-900);
    }
    .light-card .meta {
      font-size: 22px; color: var(--warm-700);
    }
    .light-card .cohort {
      display: flex; align-items: center; gap: 4px; margin-top: 16px;
    }
    .light-card .cohort .av {
      width: 56px; height: 56px; border-radius: 9999px;
      border: 4px solid var(--cream-50);
    }
    .light-card .cohort .av + .av { margin-left: -22px; }
    .light-card .cohort .count {
      margin-left: 18px; font-size: 20px; font-weight: 500; color: var(--warm-700);
    }

    /* CARD — dark continue-state card */
    .dark-card {
      background: var(--warm-900);
      color: var(--cream-100);
      border-radius: 28px;
      padding: 64px 56px;
      width: 100%; max-width: 800px;
      min-height: 540px;
      display: flex; flex-direction: column; justify-content: space-between; gap: 28px;
      box-sizing: border-box;
    }
    .dark-card .eyebrow {
      font-size: 22px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--orange-300);
    }
    .dark-card .title {
      font-family: 'Anton', sans-serif;
      font-size: 76px; line-height: 0.98;
      text-transform: uppercase; letter-spacing: -0.01em;
      color: var(--cream-100); margin-top: 14px;
    }
    .dark-card .progress-bar {
      height: 10px; background: rgba(245,235,214,0.15); border-radius: 5px; overflow: hidden;
    }
    .dark-card .progress-bar > div {
      width: 42%; height: 100%; background: var(--orange-500);
    }
    .dark-card .meta-row {
      display: flex; justify-content: space-between; margin-top: 18px;
      font-size: 20px;
    }
    .dark-card .meta-row .left { color: #B8A799; }
    .dark-card .meta-row .right { color: var(--orange-300); font-weight: 600; }
  </style>
</head>
<body>

<!-- PAGE 1 — Light path card -->
<div class="page" data-screen-label="01 — Light card">
  <div class="corner-mark"><span class="accent">HG</span> &nbsp;·&nbsp; LIGHT PATH CARD</div>
  <div class="light-card">
    <div class="eyebrow">NEW PATH</div>
    <div class="title">Writing PR descriptions reviewers actually read</div>
    <div class="meta">7 lessons &nbsp;·&nbsp; 1 hr 20 min &nbsp;·&nbsp; Beginner</div>
    <div class="cohort">
      <div class="av" style="background:#F0E0BD"></div>
      <div class="av" style="background:#8A7765"></div>
      <div class="av" style="background:#FF8A52"></div>
      <div class="count">312 in cohort</div>
    </div>
  </div>
</div>

<!-- PAGE 2 — Dark continue-state card -->
<div class="page" data-screen-label="02 — Dark card">
  <div class="corner-mark"><span class="accent">HG</span> &nbsp;·&nbsp; DARK CONTINUE CARD</div>
  <div class="dark-card">
    <div>
      <div class="eyebrow">CONTINUE</div>
      <div class="title">Reframing a stuck project</div>
    </div>
    <div>
      <div class="progress-bar"><div></div></div>
      <div class="meta-row">
        <span class="left">Lesson 3 of 7</span>
        <span class="right">42%</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
