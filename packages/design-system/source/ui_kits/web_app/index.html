<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Human Growth — Home</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { background: var(--cream-100); }
  </style>
</head>
<body data-screen-label="Web app — home">
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="AppHeader.jsx"></script>
  <script type="text/babel" src="ContinueHero.jsx"></script>
  <script type="text/babel" src="ThisWeek.jsx"></script>
  <script type="text/babel" src="RecommendedPaths.jsx"></script>
  <script type="text/babel" src="BadgeWallet.jsx"></script>
  <script type="text/babel" src="LessonPlayer.jsx"></script>

  <script type="text/babel">
    function App() {
      const [playerOpen, setPlayerOpen] = React.useState(false);
      const open = () => setPlayerOpen(true);
      const close = () => setPlayerOpen(false);
      return (
        <>
          <Sidebar active="home" />
          <div style={{ marginLeft: 248, minHeight: '100vh' }}>
            <AppHeader />
            <div style={{ padding: '32px 40px', maxWidth: 1280, margin: '0 auto' }}>
              <div style={{ marginBottom: 8 }}>
                <span className="eyebrow">HOME</span>
              </div>
              <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 40, textTransform: 'uppercase', letterSpacing: '-0.02em', lineHeight: 0.95, margin: '4px 0 28px' }}>
                Back, Priya.
              </h1>
              <ContinueHero onOpen={open} />
              <ThisWeek />
              <RecommendedPaths onPathClick={open} />
              <BadgeWallet />
            </div>
          </div>
          <LessonPlayer open={playerOpen} onClose={close} />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
