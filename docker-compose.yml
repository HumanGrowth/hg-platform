# Stack local de desarrollo Human Growth
# Uso: cp .env.example .env && docker compose up --build
name: hg

services:
  postgres:
    image: postgres:16-alpine
    container_name: hg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hg}
      POSTGRES_DB: ${POSTGRES_DB:-hg_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hg} -d ${POSTGRES_DB:-hg_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hg-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: hg-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hg}:${POSTGRES_PASSWORD:-hg}@postgres:5432/${POSTGRES_DB:-hg_dev}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend/src:/app/src:ro
      - ./apps/backend/migrations:/app/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: hg-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hg}:${POSTGRES_PASSWORD:-hg}@postgres:5432/${POSTGRES_DB:-hg_dev}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: ["celery", "-A", "hg.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: hg-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      AUTH_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET:-change_me}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
