name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend ─────────────────────────────────────────────
  backend:
    name: Backend · lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hg
          POSTGRES_PASSWORD: hg
          POSTGRES_DB: hg_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U hg -d hg_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://hg:hg@localhost:5432/hg_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci_only_secret

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Apply migrations
        # Crea tablas + enums + roles RLS (hg_app / hg_superadmin) que los tests
        # necesitan; sin esto pytest corre contra una DB vacía.
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest --cov=hg --cov-report=term-missing

  # ─── Frontend ────────────────────────────────────────────
  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          # El lockfile vive en la raíz del monorepo, no en apps/frontend.
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  # ─── Docker build (smoke) ────────────────────────────────
  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: false
          tags: hg-backend:ci

      - name: Build frontend image
        # Contexto = raíz del monorepo: el Dockerfile copia el workspace
        # (pnpm-lock, packages/*) para resolver deps y generar el standalone.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: false
          tags: hg-frontend:ci
